    <!-- Crawler-visible fallback: described content for search engines and
         users without JavaScript. The React app replaces this on hydrate. -->
    <noscript>
      <main style="font-family: system-ui, sans-serif; max-width: 720px; margin: 4rem auto; padding: 0 1.5rem; color: #e8e8e8; background: #050914;">
        <h1>CVAN — Celestial Visibility Analysis Network</h1>
        <p>A real-time stargazing planner computing Milky Way visibility, aurora Kp forecasts, Bortle light pollution class, planet and moon positions, deep-sky catalogs, Hubble + JWST imagery, comets, near-Earth objects, dwarf planets, pulsars, black holes, and live transient events.</p>
        <h2>Data sources</h2>
        <ul>
          <li>NOAA Space Weather Prediction Center (Kp, aurora oval)</li>
          <li>NOAA VIIRS Day-Night Band (light pollution)</li>
          <li>Open-Meteo (cloud cover, visibility)</li>
          <li>NASA NeoWs, Mars Photo API, and JPL ephemerides</li>
          <li>ESA Hubble and STScI image archives</li>
        </ul>
        <p>Please enable JavaScript to use the interactive app.</p>
      </main>

    <script>
      // Register the service worker on production hosts only — keeps Vite
      // dev (which has its own HMR + module graph) from being shadowed
      // by a cached app shell.
      if (
        "serviceWorker" in navigator &&
        location.hostname !== "localhost" &&
        location.hostname !== "127.0.0.1"
      ) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
