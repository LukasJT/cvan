<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#0d1b3d" stop-opacity="1"/>
      <stop offset="60%" stop-color="#050914" stop-opacity="1"/>
      <stop offset="100%" stop-color="#02040a" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4b86a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#d4b86a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mw-band" x1="0%" x2="100%" y1="0%" y2="0%">
      <stop offset="0%" stop-color="#3a4870" stop-opacity="0"/>
      <stop offset="15%" stop-color="#8094c0" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#c8c0d0" stop-opacity="0.85"/>
      <stop offset="85%" stop-color="#8094c0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#3a4870" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Star field -->
  <g fill="#ffffff">
    <circle cx="92"   cy="78"  r="0.8" opacity="0.6"/>
    <circle cx="178"  cy="142" r="1.1" opacity="0.7"/>
    <circle cx="265"  cy="58"  r="0.6" opacity="0.5"/>
    <circle cx="332"  cy="200" r="1.4" opacity="0.8"/>
    <circle cx="415"  cy="92"  r="0.9" opacity="0.7"/>
    <circle cx="490"  cy="170" r="0.6" opacity="0.6"/>
    <circle cx="570"  cy="60"  r="1.6" opacity="0.9"/>
    <circle cx="640"  cy="135" r="0.8" opacity="0.65"/>
    <circle cx="715"  cy="220" r="0.7" opacity="0.6"/>
    <circle cx="800"  cy="80"  r="1.0" opacity="0.7"/>
    <circle cx="870"  cy="165" r="0.9" opacity="0.7"/>
    <circle cx="945"  cy="48"  r="0.7" opacity="0.55"/>
    <circle cx="1020" cy="120" r="1.3" opacity="0.85"/>
    <circle cx="1105" cy="205" r="0.8" opacity="0.65"/>
    <circle cx="60"   cy="510" r="1.0" opacity="0.7"/>
    <circle cx="145"  cy="585" r="0.9" opacity="0.75"/>
    <circle cx="245"  cy="465" r="0.7" opacity="0.6"/>
    <circle cx="320"  cy="555" r="1.5" opacity="0.85"/>
    <circle cx="425"  cy="600" r="0.8" opacity="0.65"/>
    <circle cx="540"  cy="500" r="0.6" opacity="0.55"/>
    <circle cx="630"  cy="585" r="1.2" opacity="0.8"/>
    <circle cx="730"  cy="490" r="0.7" opacity="0.6"/>
    <circle cx="830"  cy="560" r="0.9" opacity="0.7"/>
    <circle cx="930"  cy="600" r="1.1" opacity="0.8"/>
    <circle cx="1040" cy="500" r="0.6" opacity="0.55"/>
    <circle cx="1140" cy="570" r="0.8" opacity="0.65"/>
  </g>

  <!-- Diagonal Milky Way band sweeping low-left to high-right -->
  <g transform="translate(0,540) rotate(-18 600 0)">
    <rect x="-200" y="-90" width="1600" height="180" fill="url(#mw-band)" opacity="0.55"/>
    <rect x="-200" y="-44" width="1600" height="88"  fill="url(#mw-band)" opacity="0.6"/>
    <rect x="-200" y="-12" width="1600" height="24"  fill="url(#mw-band)" opacity="0.7"/>
  </g>

  <!-- Galactic-center glow on the band -->
  <circle cx="370" cy="430" r="160" fill="url(#glow)"/>

  <!-- Concentric orbit rings (orrery accent, top-right) -->
  <g transform="translate(990,180)" fill="none" stroke="#d4b86a" stroke-opacity="0.35" stroke-dasharray="2 4">
    <circle r="40"/>
    <circle r="68"/>
    <circle r="98"/>
    <circle r="130"/>
  </g>
  <!-- Central sun -->
  <circle cx="990" cy="180" r="14" fill="#ffe48a"/>
  <circle cx="990" cy="180" r="34" fill="#ffe48a" opacity="0.25"/>
  <!-- A few planets at staggered phases -->
  <circle cx="1030" cy="180" r="3.2" fill="#d4b07a"/>
  <circle cx="1042" cy="208" r="3.5" fill="#5b9cf7"/>
  <circle cx="1080" cy="140" r="4.0" fill="#d96a3a"/>
  <circle cx="1080" cy="232" r="5.0" fill="#e9d29a"/>

  <!-- Title block -->
  <g font-family="Cinzel, Georgia, serif">
    <text x="80" y="220" font-size="120" font-weight="600" fill="#d4b86a" letter-spacing="6">CVAN</text>
    <text x="84" y="265" font-size="22" letter-spacing="6" fill="#c0c8d8" font-family="JetBrains Mono, monospace">CELESTIAL · VISIBILITY · ANALYSIS · NETWORK</text>
  </g>

  <!-- Tagline -->
  <text x="80" y="320" font-size="32" fill="#e8e8e8" font-family="Cormorant Garamond, Georgia, serif" font-style="italic">
    A real-time stargazing planner for any location on Earth.
  </text>

  <!-- Feature pills -->
  <g font-family="JetBrains Mono, monospace" font-size="15" letter-spacing="1.5">
    <g transform="translate(80,378)">
      <rect width="200" height="32" rx="2" fill="none" stroke="#d4b86a" stroke-opacity="0.55"/>
      <text x="100" y="22" fill="#d4b86a" text-anchor="middle">MILKY  WAY  + AURORA</text>
    </g>
    <g transform="translate(294,378)">
      <rect width="190" height="32" rx="2" fill="none" stroke="#9fd7f7" stroke-opacity="0.55"/>
      <text x="95"  y="22" fill="#9fd7f7" text-anchor="middle">PLANETS  +  MOONS</text>
    </g>
    <g transform="translate(498,378)">
      <rect width="170" height="32" rx="2" fill="none" stroke="#e89a5a" stroke-opacity="0.55"/>
      <text x="85"  y="22" fill="#e89a5a" text-anchor="middle">DEEP  SKY  ATLAS</text>
    </g>
    <g transform="translate(682,378)">
      <rect width="200" height="32" rx="2" fill="none" stroke="#d96aff" stroke-opacity="0.55"/>
      <text x="100" y="22" fill="#d96aff" text-anchor="middle">TRANSIENT  EVENTS</text>
    </g>
  </g>

  <!-- Footer URL -->
  <text x="80" y="585" font-size="20" font-family="JetBrains Mono, monospace" fill="#7a8a9a" letter-spacing="2">
    CELESTIALVISIBILITY.COM
  </text>

  <!-- Source attribution -->
  <text x="1120" y="585" font-size="13" font-family="JetBrains Mono, monospace" fill="#5a6a7a" text-anchor="end" letter-spacing="1">
    Data: NOAA · NASA · JPL · Open-Meteo
  </text>
</svg>
